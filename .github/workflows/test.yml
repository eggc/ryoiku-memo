name: Android CI with Jacoco

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create dummy google-services.json
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789",
              "project_id": "dummy-project",
              "storage_bucket": "dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:123456789",
                  "android_client_info": {
                    "package_name": "net.eggc.ryoikumemo"
                  }
                },
                "api_key": [
                  {
                    "current_key": "dummy-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "status": 1
                  },
                  "auth_setting": {
                    "google_signin_service": {
                      "status": 2
                    }
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "dummy-client-id.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Jacoco Report (Unit + Android Tests)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -no-snapshot-load
          script: |
            firebase emulators:exec --only firestore,auth "./gradlew :app:jacocoTestReport"

      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/build/reports/jacoco/jacocoTestReport/html/
